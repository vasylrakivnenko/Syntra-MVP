{% extends "base.html" %}
{% block title %}Sign in — Syntra{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="text-center mb-4">
      <div class="display-5">⚖️</div>
      <h2 class="fw-bold">Syntra</h2>
      <p class="text-muted small">AI-native General Counsel</p>
    </div>
    <div class="card">
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Name</label>
            <input type="text" class="form-control" name="username" autofocus required
                   placeholder="e.g. Alex Smith">
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Role</label>
            <select class="form-select" name="role">
              <option value="owner">Owner — full access</option>
              <option value="attorney">Attorney — review queue</option>
            </select>
          </div>
          <button type="submit" class="btn btn-dark w-100">Continue</button>
        </form>
      </div>
    </div>
    <p class="text-center text-muted small mt-3">
      No account needed — name is used as your display identity.
    </p>
  </div>
</div>
{% endblock %}
